<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <title>Khamoun Education</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Prevent "Cannot set property fetch of #<Window> which has only a getter" error
      try {
        const originalFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          configurable: true,
          enumerable: true,
          get: () => originalFetch,
          set: () => {
            console.warn('Ignored attempt to overwrite window.fetch');
          }
        });
      } catch (e) {
        console.error('Failed to redefine window.fetch', e);
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
